<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realmate | Notifications Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="forum.css">
    <link rel="stylesheet" href="notifications.css">
    <script src="theme.js"></script>
</head>
<body>

<div class="sidebar">
    <div class="brand">
        <img src="images/realmate2.png" onclick="location.href='home.html'" alt="Realmate Logo">
    </div>
    <div class="nav-item" onclick="location.href='home.html'"><i class="fas fa-house"></i> <span>Home Feed</span></div>
    <div class="nav-item" onclick="location.href='dashboard.html'"><i class="fas fa-user-tie"></i> <span>Profile</span></div>
    <div class="nav-item" onclick="location.href='livemarket.html'"><i class="fas fa-chart-line"></i> <span>Live Market</span></div>
  <div class="nav-item" onclick="location.href='analytics.html'"><i class="fas fa-chart-area"></i> <span>Analytics</span></div>
    <div class="nav-item" onclick="location.href='forum.html'"><i class="fas fa-people-group"></i> <span>Forum</span></div>
    <div class="nav-item active"><i class="fas fa-bell"></i> <span>Notifications <span id="navNotifBadge" class="nav-inline-badge" style="display:none;">0</span></span></div>
    <div class="nav-item" onclick="location.href='settings.html'"><i class="fas fa-cog"></i> <span>Settings</span></div>
</div>

<div class="main-content">
    <div class="top-bar" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <div class="page-title" style="font-size: 24px; font-weight: 800; color: var(--text-main);">Notifications Hub</div>
        <div class="action-header-controls">
            <button class="text-action-btn" onclick="markAllNotificationsAsRead()">
                <i class="fas fa-check-double"></i> Mark all as read
            </button>
        </div>
    </div>

    <div class="notifications-scroll-area">
        <div class="stats-overview-bar">
            <div class="stat-bubble">
                <span class="stat-num" id="unreadCountDisplay">0</span>
                <span class="stat-label">Unread Alerts</span>
            </div>
        </div>

        <div id="notificationsContainer" class="notifications-list-wrapper">
            <div class="notif-loading-shimmer">
                <i class="fas fa-circle-notch fa-spin"></i> Synchronizing stream ledger...
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="search-overlay.js"></script>
<script src="auth-guard.js"></script>
<script src="mates.js"></script>
<script src="notifications.js"></script>
<!-- Mobile Bottom Navigation -->
<nav class="mobile-bottom-nav">
    <a class="mob-nav-item" href="livemarket.html"><i class="fas fa-chart-line"></i><span>Live Market</span></a>
    <a class="mob-nav-item" href="forum.html"><i class="fas fa-people-group"></i><span>Forum</span></a>
    <a class="mob-nav-item mob-nav-center" href="home.html"><i class="fas fa-house"></i><span>Home</span></a>
    <a class="mob-nav-item active" href="notifications.html"><i class="fas fa-bell"></i><span>Notifications</span></a>
    <div class="mob-nav-item mob-nav-avatar-wrap" onclick="toggleNavMenu(event)">
        <div class="mob-nav-avatar" id="navAvatar"><i class="fas fa-user-tie" style="font-size:13px;"></i></div>
        <span>Me</span>
        <div class="mob-nav-menu" id="navMenu">
            <a href="dashboard.html"><i class="fas fa-user-tie"></i> Profile</a>
      <a href="realmates.html"><i class="fas fa-handshake"></i> Realmates</a>
          <a href="analytics.html"><i class="fas fa-chart-area"></i> Analytics</a>
            <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>
</nav>
<script src="nav-menu.js"></script>
</body>
</html>
