<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="forum.css">
  <script src="theme.js"></script>
  <style>
    .mo-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      background: linear-gradient(135deg, #0f172a 0%, #1a1a2e 50%, #0f172a 100%);
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 48px; border-bottom: 2px solid #32cd32; overflow: hidden;
    }
    .mo-header::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, #32cd32, #3b82f6, #32cd32, transparent);
      background-size: 200% 100%; animation: moBar 4s linear infinite;
    }
    @keyframes moBar { 0% { background-position: 0% 0; } 100% { background-position: 200% 0; } }
    .mo-back { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; color: #94a3b8; cursor: pointer; padding: 6px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); transition: all 0.15s; position: relative; z-index: 1; }
    .mo-back:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .mo-title { font-size: 16px; font-weight: 800; color: #fff; position: relative; z-index: 1; }

    .mo-page { max-width: 800px; margin: 0 auto; padding: 58px 16px 80px; font-family: 'Inter', sans-serif; }

    .mo-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    .mo-sum-card { background: #0f172a; border-radius: 12px; padding: 16px; text-align: center; }
    .mo-sum-num { font-size: 24px; font-weight: 800; color: #fff; }
    .mo-sum-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; margin-top: 4px; }

    .mo-section-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: #9ca3af; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

    .mo-table { width: 100%; border-collapse: collapse; }
    .mo-table th { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #9ca3af; text-align: left; padding: 8px 12px; border-bottom: 1px solid #e5e7eb; }
    .mo-table td { padding: 12px; border-bottom: 1px solid #f3f4f6; font-size: 13px; color: #374151; }
    .mo-table tr { cursor: pointer; transition: background 0.1s; }
    .mo-table tbody tr:hover { background: #f9fafb; }
    .mo-proj-name { font-weight: 700; color: #111827; }
    .mo-proj-unit { font-size: 11px; color: #9ca3af; }
    .mo-price { font-weight: 800; color: #111827; }
    .mo-spread { font-size: 11px; color: #9ca3af; }
    .mo-sent { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.5px; display: inline-block; }
    .mo-sent-buy { background: rgba(50,205,50,0.12); color: #16a34a; }
    .mo-sent-sell { background: rgba(239,68,68,0.12); color: #dc2626; }
    .mo-sent-neutral { background: #f3f4f6; color: #6b7280; }

    .mo-loading { text-align: center; padding: 80px 20px; color: #9ca3af; }

    /* Mobile cards instead of table */
    .mo-card-list { display: none; }
    .mo-card-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; border-bottom: 1px solid #f3f4f6; cursor: pointer;
      transition: background 0.1s;
    }
    .mo-card-item:hover { background: #f9fafb; }
    .mo-card-item:last-child { border: none; }
    .mo-card-left { flex: 1; min-width: 0; }
    .mo-card-right { text-align: right; flex-shrink: 0; }

    @media (max-width: 768px) {
      .mo-header { padding: 8px 14px; }
      .mo-page { padding-top: 50px; padding-left: 12px; padding-right: 12px; }
      .mo-summary { grid-template-columns: repeat(3, 1fr); gap: 6px; }
      .mo-sum-card { padding: 12px 8px; }
      .mo-sum-num { font-size: 18px; }
      .mo-sum-label { font-size: 9px; }
      .mo-table-wrap { display: none; }
      .mo-card-list { display: block; background: #fff; border: 1px solid #e5e7eb; border-radius: 14px; overflow: hidden; }
    }
    @media (min-width: 769px) { .mo-header { left: 240px; } }

    html[data-theme="dark"] .mo-table th { border-color: #334155; color: #64748b; }
    html[data-theme="dark"] .mo-table td { border-color: #1f2937; color: #94a3b8; }
    html[data-theme="dark"] .mo-table tbody tr:hover { background: #1e293b; }
    html[data-theme="dark"] .mo-proj-name { color: #f1f5f9; }
    html[data-theme="dark"] .mo-price { color: #f1f5f9; }
  </style>
</head>
<body>

<div class="sidebar">

  <div class="nav-item" onclick="location.href='home.html'"><i class="fas fa-house"></i><span>Home Feed</span></div>
  <div class="nav-item" onclick="location.href='dashboard.html'"><i class="fas fa-user-tie"></i><span>Profile</span></div>
  <div class="nav-item" onclick="location.href='livemarket.html'"><i class="fas fa-chart-line"></i><span>Live Market</span></div>
  <div class="nav-item" onclick="location.href='analytics.html'"><i class="fas fa-chart-area"></i><span>Analytics</span></div>
  <div class="nav-item" onclick="location.href='forum.html'"><i class="fas fa-people-group"></i><span>Forum</span></div>
  <div class="nav-item" onclick="location.href='notifications.html'"><i class="fas fa-bell"></i><span>Notifications</span></div>

</div>

<div class="mo-header">
  <button class="mo-back" onclick="history.back()"><i class="fas fa-chevron-left"></i> Back</button>
  <span class="mo-title"><i class="fas fa-chart-line" style="margin-right:5px;color:#32cd32;"></i>Market Overview</span>
</div>

<div class="main-content">
  <div class="mo-page">
    <div id="moContent" class="mo-loading"><i class="fas fa-spinner fa-spin" style="font-size:24px;"></i></div>
  </div>
</div>

<nav class="mobile-bottom-nav">
  <a class="mob-nav-item" href="livemarket.html"><i class="fas fa-chart-line"></i><span>Live Market</span></a>
  <a class="mob-nav-item" href="forum.html"><i class="fas fa-people-group"></i><span>Forum</span></a>
  <a class="mob-nav-item mob-nav-center" href="home.html"><i class="fas fa-house"></i><span>Home</span></a>
  <a class="mob-nav-item" href="notifications.html"><i class="fas fa-bell"></i><span>Notifications</span></a>
  <div class="mob-nav-item mob-nav-avatar-wrap" onclick="toggleNavMenu(event)">
    <div class="mob-nav-avatar" id="navAvatar"><i class="fas fa-user-tie" style="font-size:13px;"></i></div>
    <span>Me</span>
    <div class="mob-nav-menu" id="navMenu">
      <a href="dashboard.html"><i class="fas fa-user-tie"></i> Profile</a>
      <a href="realmates.html"><i class="fas fa-handshake"></i> Realmates</a>

    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth-guard.js"></script>
<script src="nav-menu.js"></script>
<script src="notif-badge.js"></script>
<script>
const _sb = supabase.createClient('https://wmegpgrfrtprhuzmgjma.supabase.co', 'sb_publishable_Rm_fIBDUfu3DEyLj0_bWZw_qEqo8cd4');

const KNOWN_PROJECTS = [
  'One Maridien','Two Maridien','Verve One','Verve Two',
  'Park Triangle Residences','Gentry Residences','Park East Place',
  'Two Serendra','Kroma','Lerato',
  'The Columns Ayala Avenue','The Columns Legazpi Village',
  'Senta','Mondia','Treveia','Venare','Lumira','Mirala',
  'Venido','Aveia','TREC','The Residences At Greenbelt',
];
const COMPANY_NAMES = ['alveo land corp','alveo land','alveo','smdc','dmci','ayala','megaworld','filinvest','rockwell','camella','avida','amaia','federal'];

function formatP(n) {
  if (n >= 1e6) return '₱' + (n/1e6).toFixed(1).replace(/\.0$/,'') + 'M';
  if (n >= 1e3) return '₱' + (n/1e3).toFixed(0) + 'K';
  return '₱' + n.toFixed(0);
}

function extractPrice(text) {
  const lower = text.toLowerCase();
  let m = lower.match(/(\d+\.?\d*)\s*m(?:illion)?/);
  if (m) return parseFloat(m[1]) * 1e6;
  m = text.replace(/,/g,'').match(/\b(\d{7,9})\b/);
  if (m) return parseFloat(m[1]);
  return null;
}

function extractUnit(text) {
  const lower = text.toLowerCase();
  if (/\bstudio\b/.test(lower)) return 'Studio';
  if (/\b1\s*br\b|1\s*bed/i.test(text)) return '1BR';
  if (/\b2\s*br\b|2\s*bed/i.test(text)) return '2BR';
  if (/\b3\s*br\b|3\s*bed/i.test(text)) return '3BR';
  if (/\b4\s*br\b|4\s*bed/i.test(text)) return '4BR';
  return null;
}

function extractProject(text) {
  const upper = text.toUpperCase();
  let earliest = Infinity, found = null;
  for (const proj of KNOWN_PROJECTS) {
    const idx = upper.indexOf(proj.toUpperCase());
    if (idx !== -1 && idx < earliest) { earliest = idx; found = proj; }
  }
  return found;
}

async function loadOverview() {
  const { data: listings } = await _sb.from('listings').select('*').eq('archived', false);
  if (!listings) { document.getElementById('moContent').innerHTML = '<p>Failed to load.</p>'; return; }

  const SEGS = {
    ownership: { supply: ['FOR SALE'], demand: ['WILLING TO BUY'], label: '' },
    rental: { supply: ['FOR RENT'], demand: ['WILLING TO RENT'], label: 'Rent' },
    lease: { supply: ['FOR LEASE'], demand: ['WILLING TO LEASE'], label: 'Lease' }
  };
  function getSeg(cat) { for (const [s, c] of Object.entries(SEGS)) { if ([...c.supply,...c.demand].includes(cat)) return s; } return null; }

  const buckets = {};
  listings.forEach(l => {
    const text = l.content || '';
    const price = extractPrice(text);
    const unit = extractUnit(text);
    const proj = extractProject(text);
    if (!price || !unit || !proj) return;
    if (COMPANY_NAMES.some(c => proj.toLowerCase() === c)) return;
    const cat = l.category || '';
    const seg = getSeg(cat);
    if (!seg) return;
    const isSupply = cat.startsWith('FOR');
    const key = `${proj.toLowerCase()}||${unit.toLowerCase()}||${seg}`;
    if (!buckets[key]) buckets[key] = { proj, unit, segment: seg, supply: [], demand: [], all: [] };
    buckets[key].all.push(price);
    if (isSupply) buckets[key].supply.push(price);
    else buckets[key].demand.push(price);
  });

  const items = Object.values(buckets).map(b => {
    const avg = b.all.reduce((s,p)=>s+p,0) / b.all.length;
    const min = Math.min(...b.all);
    const max = Math.max(...b.all);
    let sentiment = 'Neutral', sentClass = 'neutral';
    if (b.demand.length > b.supply.length * 1.5) { sentiment = 'Strong Buy'; sentClass = 'buy'; }
    else if (b.demand.length > b.supply.length) { sentiment = 'Buy'; sentClass = 'buy'; }
    else if (b.supply.length > b.demand.length * 1.5) { sentiment = 'Strong Sell'; sentClass = 'sell'; }
    else if (b.supply.length > b.demand.length) { sentiment = 'Sell'; sentClass = 'sell'; }
    const segLabel = SEGS[b.segment]?.label || '';
    return { ...b, avg, min, max, sentiment, sentClass, segLabel, count: b.all.length };
  }).sort((a,b) => b.avg - a.avg);

  const totalProjects = new Set(items.map(i => i.proj.toLowerCase())).size;
  const totalListings = items.reduce((s,i) => s + i.count, 0);
  const avgPrice = items.length ? items.reduce((s,i) => s + i.avg, 0) / items.length : 0;

  const container = document.getElementById('moContent');
  container.innerHTML = `
    <div class="mo-summary">
      <div class="mo-sum-card">
        <div class="mo-sum-num">${totalProjects}</div>
        <div class="mo-sum-label">Projects</div>
      </div>
      <div class="mo-sum-card">
        <div class="mo-sum-num">${totalListings}</div>
        <div class="mo-sum-label">Data Points</div>
      </div>
      <div class="mo-sum-card">
        <div class="mo-sum-num">${formatP(avgPrice)}</div>
        <div class="mo-sum-label">Avg Market Value</div>
      </div>
    </div>

    <div class="mo-section-title"><i class="fas fa-list" style="color:#32cd32;"></i> Market Watchlist</div>

    <!-- Desktop table -->
    <div class="mo-table-wrap" style="background:#fff;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden;">
      <table class="mo-table">
        <thead>
          <tr>
            <th>Project</th>
            <th>Market Value</th>
            <th>Range</th>
            <th>Sentiment</th>
          </tr>
        </thead>
        <tbody>
          ${items.map(item => {
            const key = encodeURIComponent(`${item.proj}||${item.unit}||${item.segment}`);
            return `<tr onclick="location.href='market-summary.html?key=${key}'">
              <td>
                <div class="mo-proj-name">${item.proj}${item.segLabel ? ` <span style="font-size:10px;color:#9ca3af;font-weight:600;">${item.segLabel}</span>` : ''}</div>
                <div class="mo-proj-unit">${item.unit}</div>
              </td>
              <td class="mo-price">${formatP(item.avg)}</td>
              <td class="mo-spread">${formatP(item.min)} – ${formatP(item.max)}</td>
              <td><span class="mo-sent mo-sent-${item.sentClass}">${item.sentiment}</span></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>

    <!-- Mobile cards -->
    <div class="mo-card-list">
      ${items.map(item => {
        const key = encodeURIComponent(`${item.proj}||${item.unit}||${item.segment}`);
        return `<div class="mo-card-item" onclick="location.href='market-summary.html?key=${key}'">
          <div class="mo-card-left">
            <div class="mo-proj-name">${item.proj}${item.segLabel ? ` <span style="font-size:10px;color:#9ca3af;font-weight:600;">${item.segLabel}</span>` : ''}</div>
            <div style="font-size:11px;color:#9ca3af;margin-top:2px;">${item.unit} · ${formatP(item.min)} – ${formatP(item.max)}</div>
          </div>
          <div class="mo-card-right">
            <div class="mo-price">${formatP(item.avg)}</div>
            <span class="mo-sent mo-sent-${item.sentClass}" style="margin-top:4px;">${item.sentiment}</span>
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
}

document.addEventListener('DOMContentLoaded', loadOverview);
</script>
</body>
