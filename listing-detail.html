<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Realmate | Listing</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="forum.css">
  <script src="theme.js"></script>
  <style>
    .ld-page { max-width: 680px; margin: 0 auto; padding: 20px 16px 80px; }
    .ld-back { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; color: var(--text-sub); cursor: pointer; margin-bottom: 18px; padding: 8px 14px; border-radius: 10px; border: 1px solid var(--border); background: #fff; transition: all 0.15s; }
    .ld-back:hover { background: #f1f5f9; color: var(--text-main); }
    .ld-card { background: #fff; border: 1px solid var(--border); border-radius: 20px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    .ld-images { position: relative; overflow: hidden; }
    .ld-images-scroll { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .ld-images-scroll::-webkit-scrollbar { display: none; }
    .ld-images-scroll img { width: 100%; min-width: 100%; max-height: 400px; object-fit: cover; scroll-snap-align: start; cursor: pointer; flex-shrink: 0; }
    .ld-img-count { position: absolute; bottom: 12px; right: 12px; background: rgba(0,0,0,0.65); color: #fff; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; pointer-events: none; }
    .ld-img-dots { display: flex; justify-content: center; gap: 6px; padding: 10px 0 4px; }
    .ld-img-dot { width: 7px; height: 7px; border-radius: 50%; background: #cbd5e1; transition: all 0.2s; }
    .ld-img-dot.active { background: #32cd32; width: 18px; border-radius: 4px; }
    .ld-lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 99999; display: flex; align-items: center; justify-content: center; cursor: zoom-out; }
    .ld-lightbox img { max-width: 92vw; max-height: 90vh; object-fit: contain; border-radius: 10px; }
    .ld-lb-nav { position: absolute; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.15); border: none; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .ld-lb-nav:hover { background: rgba(255,255,255,0.3); }
    .ld-lb-prev { left: 16px; }
    .ld-lb-next { right: 16px; }
    .ld-lb-close { position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.15); border: none; color: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .ld-body { padding: 24px; }
    .ld-cat { display: inline-block; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; padding: 5px 14px; border-radius: 50px; margin-bottom: 14px; }
    .ld-cat-sale { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .ld-cat-rent { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
    .ld-cat-lease { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .ld-cat-wbuy { background: #fefce8; color: #ca8a04; border: 1px solid #fde68a; }
    .ld-cat-wrent { background: #eef2ff; color: #4f46e5; border: 1px solid #c7d2fe; }
    .ld-cat-wlease { background: #fdf4ff; color: #a855f7; border: 1px solid #e9d5ff; }
    .ld-content { font-size: 15px; line-height: 1.7; color: var(--text-main); white-space: pre-line; margin-bottom: 18px; }
    .ld-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
    .ld-tag { font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 50px; border: 1px solid; display: inline-flex; align-items: center; gap: 5px; }
    .ld-tag-loc { background: #f0fdf4; color: #16a34a; border-color: #bbf7d0; }
    .ld-tag-unit { background: #eff6ff; color: #2563eb; border-color: #bfdbfe; }
    .ld-tag-project { background: #fefce8; color: #92400e; border-color: #fde68a; }
    .ld-tag-price { background: #fce7f3; color: #9d174d; border-color: #fbcfe8; }
    .ld-tag-feature { background: #f1f5f9; color: #475569; border-color: #e2e8f0; }
    .ld-divider { height: 1px; background: var(--border); margin: 18px 0; }
    .ld-user { display: flex; align-items: center; gap: 14px; }
    .ld-user img { width: 48px; height: 48px; border-radius: 14px; object-fit: cover; }
    .ld-user-name { font-size: 15px; font-weight: 700; color: var(--text-main); }
    .ld-user-job { font-size: 12px; color: var(--text-sub); }
    .ld-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-mate { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 50px; border: 1.5px solid #32cd32; background: #fff; color: #32cd32; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; font-family: inherit; }
    .btn-mate:hover:not(:disabled) { background: #32cd32; color: #fff; box-shadow: 0 2px 10px rgba(50,205,50,0.25); }
    .mate-status-pending { border-color: #94a3b8; color: #94a3b8; cursor: default; opacity: 0.8; }
    .mate-status-mates { border-color: #32cd32; background: rgba(50,205,50,0.08); color: #16a34a; cursor: default; }
    .ld-time { font-size: 12px; color: var(--text-sub); margin-bottom: 14px; }
    .ld-loading { text-align: center; padding: 60px 20px; color: #94a3b8; }

    html[data-theme="dark"] .ld-card { background: #1e293b; border-color: #334155; }
    html[data-theme="dark"] .ld-back { background: #1e293b; border-color: #334155; color: #94a3b8; }
  </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="search-overlay.js"></script>
<script src="auth-guard.js"></script>
<script src="mates.js"></script>
<script src="nav-menu.js"></script>
<script src="notif-badge.js"></script>
<script>
const _sb = supabase.createClient('https://wmegpgrfrtprhuzmgjma.supabase.co', 'sb_publishable_Rm_fIBDUfu3DEyLj0_bWZw_qEqo8cd4');

const CAT_CLASSES = {
  'FOR SALE': 'ld-cat-sale', 'FOR RENT': 'ld-cat-rent', 'FOR LEASE': 'ld-cat-lease',
  'WILLING TO BUY': 'ld-cat-wbuy', 'WILLING TO RENT': 'ld-cat-wrent', 'WILLING TO LEASE': 'ld-cat-wlease'
};

const LOCATION_KW = {
  'bgc':'BGC','bonifacio':'BGC','fort':'BGC','taguig':'Taguig',
  'makati':'Makati','salcedo':'Makati','legazpi':'Makati','rockwell':'Makati',
  'pasig':'Pasig','ortigas':'Pasig','eastwood':'Pasig',
  'mandaluyong':'Mandaluyong','quezon city':'Quezon City','qc':'Quezon City',
  'alabang':'Alabang','muntinlupa':'Muntinlupa','pasay':'Pasay',
  'laguna':'Laguna','cavite':'Cavite','cebu':'Cebu','rizal':'Rizal',
  'bulacan':'Bulacan','pampanga':'Pampanga','mckinley':'BGC','uptown':'BGC',
};

const PROJECTS = ['One Maridien','Two Maridien','Verve One','Verve Two','Park Triangle Residences','Two Serendra','Kroma','Lerato','Senta','TREC','The Residences At Greenbelt'];

function parse(text) {
  const lower = text.toLowerCase();
  const locs = [...new Set(Object.entries(LOCATION_KW).filter(([k]) => lower.includes(k)).map(([,v]) => v))];
  let unit = null;
  if (/\bstudio\b/i.test(text)) unit = 'Studio';
  else if (/\b1\s*br\b|1\s*bed/i.test(text)) unit = '1BR';
  else if (/\b2\s*br\b|2\s*bed/i.test(text)) unit = '2BR';
  else if (/\b3\s*br\b|3\s*bed/i.test(text)) unit = '3BR';
  else if (/\b4\s*br\b|4\s*bed/i.test(text)) unit = '4BR';
  let project = null;
  for (const p of PROJECTS) { if (text.toUpperCase().includes(p.toUpperCase())) { project = p; break; } }
  let price = null;
  let m = lower.match(/(\d+\.?\d*)\s*m(?:illion)?/);
  if (m) price = parseFloat(m[1]) * 1e6;
  else { m = text.replace(/,/g,'').match(/\b(\d{7,9})\b/); if (m) price = parseFloat(m[1]); }
  const features = ['furnished','fully furnished','semi furnished','bare','parking','balcony','corner unit','penthouse','rfo','preselling','pet friendly']
    .filter(f => lower.includes(f));
  return { locs, unit, project, price, features };
}

function avatarFallback(n) { return `https://ui-avatars.com/api/?name=${encodeURIComponent(n||'?')}&background=random&color=fff`; }
function safeText(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function timeAgo(d) {
  const s = Math.floor((Date.now() - new Date(d).getTime()) / 1000);
  if (s < 60) return 'Just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

async function loadListing() {
  const id = new URLSearchParams(location.search).get('id');
  const container = document.getElementById('ldContent');
  if (!id) { container.innerHTML = '<p>Listing not found.</p>'; return; }

  const { data: listing, error } = await _sb.from('listings').select('*').eq('id', id).single();
  if (error || !listing) { container.innerHTML = '<p>Listing not found or has been removed.</p>'; return; }

  const name = listing.user_name || 'Unknown';
  const img = listing.user_img || avatarFallback(name);
  const imgs = listing.image_urls || [];
  const p = parse(listing.content || '');

  let imagesHtml = '';
  if (imgs.length === 1) {
    imagesHtml = `<div class="ld-images">
      <div class="ld-images-scroll"><img src="${imgs[0]}" onclick="openLdLightbox(0)"></div>
    </div>`;
  } else if (imgs.length > 1) {
    imagesHtml = `<div class="ld-images">
      <div class="ld-images-scroll" id="ldImageScroll">${imgs.map((im, i) => `<img src="${im}" onclick="openLdLightbox(${i})">`).join('')}</div>
      <span class="ld-img-count"><i class="fas fa-images" style="margin-right:4px;"></i>1 / ${imgs.length}</span>
      <div class="ld-img-dots" id="ldDots">${imgs.map((_, i) => `<div class="ld-img-dot${i === 0 ? ' active' : ''}"></div>`).join('')}</div>
    </div>`;
  }

  container.innerHTML = `
    <div class="ld-card">
      ${imagesHtml}
      <div class="ld-body">
        <span class="ld-cat ${CAT_CLASSES[listing.category] || ''}">${listing.category}</span>
        <div class="ld-time"><i class="far fa-clock" style="margin-right:4px;"></i>${timeAgo(listing.created_at)}</div>
        <div class="ld-content">${safeText(listing.content)}</div>
        <div class="ld-tags">
          ${p.locs.map(l => `<span class="ld-tag ld-tag-loc"><i class="fas fa-map-marker-alt"></i>${l}</span>`).join('')}
          ${p.unit ? `<span class="ld-tag ld-tag-unit"><i class="fas fa-bed"></i>${p.unit}</span>` : ''}
          ${p.project ? `<span class="ld-tag ld-tag-project"><i class="fas fa-building"></i>${p.project}</span>` : ''}
          ${p.price ? `<span class="ld-tag ld-tag-price"><i class="fas fa-tag"></i>₱${(p.price/1e6).toFixed(1)}M</span>` : ''}
          ${p.features.map(f => `<span class="ld-tag ld-tag-feature">${f}</span>`).join('')}
        </div>
        <div class="ld-divider"></div>
        <div class="ld-user">
          <img src="${img}" onerror="this.src='${avatarFallback(name)}'">
          <div>
            <div class="ld-user-name">${safeText(name)}</div>
            <div class="ld-user-job">${listing.user_job || ''}</div>
          </div>
          ${!listing.is_anonymous ? `<div style="margin-left:auto;">${mateButtonHtml(name, 'btn-mate')}</div>` : ''}
        </div>
      </div>
    </div>
  `;

  // Wire up scroll tracking for dots and counter
  const scroll = document.getElementById('ldImageScroll');
  if (scroll && imgs.length > 1) {
    scroll.addEventListener('scroll', () => {
      const idx = Math.round(scroll.scrollLeft / scroll.offsetWidth);
      document.querySelectorAll('.ld-img-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
      const counter = document.querySelector('.ld-img-count');
      if (counter) counter.innerHTML = `<i class="fas fa-images" style="margin-right:4px;"></i>${idx + 1} / ${imgs.length}`;
    });
  }

  window._ldImages = imgs;
}

let _ldLbIdx = 0;

function openLdLightbox(idx) {
  _ldLbIdx = idx;
  const imgs = window._ldImages || [];
  if (!imgs.length) return;
  const existing = document.getElementById('ldLightbox');
  if (existing) existing.remove();
  const lb = document.createElement('div');
  lb.id = 'ldLightbox';
  lb.className = 'ld-lightbox';
  lb.innerHTML = `
    <button class="ld-lb-close" onclick="closeLdLightbox()"><i class="fas fa-times"></i></button>
    ${imgs.length > 1 ? `<button class="ld-lb-nav ld-lb-prev" onclick="event.stopPropagation(); navLdLightbox(-1)"><i class="fas fa-chevron-left"></i></button>` : ''}
    <img id="ldLbImg" src="${imgs[idx]}">
    ${imgs.length > 1 ? `<button class="ld-lb-nav ld-lb-next" onclick="event.stopPropagation(); navLdLightbox(1)"><i class="fas fa-chevron-right"></i></button>` : ''}
    ${imgs.length > 1 ? `<span style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#fff;font-size:13px;font-weight:700;background:rgba(0,0,0,0.5);padding:4px 14px;border-radius:20px;" id="ldLbCount">${idx+1} / ${imgs.length}</span>` : ''}
  `;
  lb.addEventListener('click', (e) => { if (e.target === lb) closeLdLightbox(); });
  document.body.appendChild(lb);
}

function closeLdLightbox() {
  document.getElementById('ldLightbox')?.remove();
}

function navLdLightbox(dir) {
  const imgs = window._ldImages || [];
  _ldLbIdx = (_ldLbIdx + dir + imgs.length) % imgs.length;
  document.getElementById('ldLbImg').src = imgs[_ldLbIdx];
  const count = document.getElementById('ldLbCount');
  if (count) count.textContent = `${_ldLbIdx + 1} / ${imgs.length}`;
}

document.addEventListener('DOMContentLoaded', loadListing);
</script>
</body>
</html>
